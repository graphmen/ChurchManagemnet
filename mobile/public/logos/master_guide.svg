<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <!-- Blue background circle with red border -->
  <circle cx="50" cy="50" r="42" fill="#0D47A1" stroke="#B71C1C" stroke-width="4"/>
  <circle cx="50" cy="50" r="37" fill="none" stroke="#FFFFFF" stroke-width="1.5"/>

  <!-- Master Guide 5-pointed Gold Star -->
  <polygon points="50,14 59,38 84,38 64,53 72,77 50,62 28,77 36,53 16,38 41,38" fill="#FFD54F" stroke="#E65100" stroke-width="1" stroke-linejoin="round"/>
  
  <!-- White Globe with Blue Grid lines in the center of the star -->
  <circle cx="50" cy="49" r="12" fill="#FFFFFF" stroke="#0D47A1" stroke-width="0.75"/>
  <ellipse cx="50" cy="49" rx="12" ry="4" fill="none" stroke="#0D47A1" stroke-width="0.5"/>
  <ellipse cx="50" cy="49" rx="4" ry="12" fill="none" stroke="#0D47A1" stroke-width="0.5"/>

  <!-- Royal Blue Shield with Gold Cross overlaying the globe -->
  <path d="M 45 42 C 45 42, 50 43.5, 55 42 C 55 49, 54 53, 50 58 C 46 53, 45 49, 45 42 Z" fill="#0D47A1" stroke="#FFFFFF" stroke-width="0.75" stroke-linejoin="round"/>
  <!-- Gold Cross inside the shield -->
  <path d="M 49 44 L 51 44 L 51 54 L 49 54 Z" fill="#FFD54F"/>
  <path d="M 47 47 L 53 47 L 53 49 L 47 49 Z" fill="#FFD54F"/>
</svg>
