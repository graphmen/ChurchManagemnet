<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <!-- Gold circular border -->
  <circle cx="50" cy="50" r="42" fill="#ECEFF1" stroke="#FFB300" stroke-width="3"/>
  
  <!-- Blue Globe background in center -->
  <circle cx="50" cy="50" r="34" fill="#FFFFFF" stroke="#90CAF9" stroke-width="1"/>
  <ellipse cx="50" cy="50" rx="34" ry="10" fill="none" stroke="#E3F2FD" stroke-width="0.5"/>
  <ellipse cx="50" cy="50" rx="10" ry="34" fill="none" stroke="#E3F2FD" stroke-width="0.5"/>

  <!-- Scales of Justice (golden outline) -->
  <!-- Central pillar (Cross) -->
  <path d="M 48 24 L 52 24 L 52 72 L 48 72 Z" fill="#B0BEC5"/>
  <path d="M 49 28 L 51 28 L 51 71 L 49 71 Z" fill="#37474F"/>
  <!-- Cross bar of the scales -->
  <path d="M 28 36 L 72 36 L 72 39 L 28 39 Z" fill="#FFB300"/>
  <circle cx="50" cy="37.5" r="3" fill="#D84315"/>
  
  <!-- Left Pan -->
  <path d="M 28 37.5 L 20 56 L 36 56 Z" fill="none" stroke="#37474F" stroke-width="1"/>
  <ellipse cx="28" cy="56" rx="8" ry="2" fill="#FFB300" stroke="#37474F" stroke-width="1"/>
  
  <!-- Right Pan -->
  <path d="M 72 37.5 L 64 56 L 80 56 Z" fill="none" stroke="#37474F" stroke-width="1"/>
  <ellipse cx="72" cy="56" rx="8" ry="2" fill="#FFB300" stroke="#37474F" stroke-width="1"/>
  
  <!-- Pedestal base -->
  <path d="M 38 72 L 62 72 L 60 76 L 40 76 Z" fill="#37474F"/>
  
  <!-- Flame rising behind or at the top of the cross pillar -->
  <path d="M 50 24 C 47 18, 50 12, 52 8 C 54 14, 52 20, 50 24 Z" fill="#D84315"/>
  <path d="M 50 24 C 49 20, 50 16, 51 12 C 52 16, 51 20, 50 24 Z" fill="#FFB300"/>
</svg>
