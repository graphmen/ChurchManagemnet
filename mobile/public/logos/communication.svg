<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <!-- Blue circle with gold border -->
  <circle cx="50" cy="50" r="42" fill="#0D47A1" stroke="#FFD54F" stroke-width="3"/>
  <circle cx="50" cy="50" r="37" fill="#1565C0"/>

  <!-- Stylized globe and transmitter waves -->
  <circle cx="50" cy="65" r="14" fill="none" stroke="#90CAF9" stroke-width="1.5"/>
  <ellipse cx="50" cy="65" rx="14" ry="5" fill="none" stroke="#90CAF9" stroke-width="1"/>
  
  <!-- Antenna tower rising from the globe -->
  <polygon points="50,25 45,65 55,65" fill="#FFD54F" stroke="#E65100" stroke-width="0.5"/>
  <circle cx="50" cy="24" r="2.5" fill="#FFFFFF"/>

  <!-- Transmitter Waves (concentric arcs) -->
  <path d="M 44 20 A 10 10 0 0 1 56 20" fill="none" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M 39 16 A 16 16 0 0 1 61 16" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"/>
  <path d="M 34 12 A 22 22 0 0 1 66 12" fill="none" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
</svg>
