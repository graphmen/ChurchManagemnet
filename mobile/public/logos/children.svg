<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <!-- Blue Globe background -->
  <circle cx="50" cy="55" r="34" fill="#E3F2FD" stroke="#90CAF9" stroke-width="1.5"/>
  <ellipse cx="50" cy="55" rx="34" ry="12" fill="none" stroke="#90CAF9" stroke-width="1"/>
  <ellipse cx="50" cy="55" rx="12" ry="34" fill="none" stroke="#90CAF9" stroke-width="1"/>
  
  <!-- Stylized Children (holding hands over the globe) -->
  <!-- Child 1 (Red, Left) -->
  <circle cx="30" cy="42" r="4.5" fill="#E53935"/>
  <path d="M 25 55 C 25 47, 35 47, 35 55 Z" fill="#E53935"/>
  
  <!-- Child 2 (Green, Center-Left) -->
  <circle cx="43" cy="38" r="4.5" fill="#43A047"/>
  <path d="M 38 50 C 38 43, 48 43, 48 50 Z" fill="#43A047"/>
  
  <!-- Child 3 (Gold/Yellow, Center-Right) -->
  <circle cx="57" cy="38" r="4.5" fill="#FFB300"/>
  <path d="M 52 50 C 52 43, 62 43, 62 50 Z" fill="#FFB300"/>

  <!-- Child 4 (Blue, Right) -->
  <circle cx="70" cy="42" r="4.5" fill="#1E88E5"/>
  <path d="M 65 55 C 65 47, 75 47, 75 55 Z" fill="#1E88E5"/>

  <!-- Holding hands lines (arms) -->
  <path d="M 32 48 Q 36 46 41 44" stroke="#FFF" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 45 44 Q 50 42 55 44" stroke="#FFF" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 59 44 Q 64 46 68 48" stroke="#FFF" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Cross in the background rising behind the children -->
  <path d="M 48 12 L 52 12 L 52 32 L 48 32 Z" fill="#FFD54F" stroke="#E65100" stroke-width="0.5"/>
  <path d="M 40 18 L 60 18 L 60 22 L 40 22 Z" fill="#FFD54F" stroke="#E65100" stroke-width="0.5"/>
</svg>
