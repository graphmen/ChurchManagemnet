<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <!-- Soft green container -->
  <circle cx="50" cy="50" r="42" fill="#E8F5E9" stroke="#4CAF50" stroke-width="3"/>
  
  <!-- Three stylized leaves forming a flame/cross shape -->
  <!-- Left Leaf (Light Green) -->
  <path d="M 48 68 C 38 65, 26 50, 35 34 C 44 44, 46 58, 48 68 Z" fill="#81C784"/>
  <!-- Right Leaf (Emerald Green) -->
  <path d="M 52 68 C 62 65, 74 50, 65 34 C 56 44, 54 58, 52 68 Z" fill="#388E3C"/>
  <!-- Center Leaf (Teal/Dark Green, pointing straight up) -->
  <path d="M 50 68 C 50 55, 42 35, 50 18 C 58 35, 50 55, 50 68 Z" fill="#2E7D32"/>

  <!-- Red Cross in the center of the stem -->
  <path d="M 48 58 L 52 58 L 52 74 L 48 74 Z" fill="#D32F2F"/>
  <path d="M 44 64 L 56 64 L 56 67 L 44 67 Z" fill="#D32F2F"/>
</svg>
