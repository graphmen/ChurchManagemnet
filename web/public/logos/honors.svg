<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <!-- Pathfinder Honor patch: Oval with green border and yellow fill -->
  <ellipse cx="50" cy="50" rx="40" ry="32" fill="#FFF9C4" stroke="#2E7D32" stroke-width="5"/>
  
  <!-- Inner stitched line for authentic patch look -->
  <ellipse cx="50" cy="50" rx="36" ry="28" fill="none" stroke="#81C784" stroke-width="1.5" stroke-dasharray="3 3"/>

  <!-- Stylized Green Pine Tree (Nature Honor) -->
  <!-- Trunk -->
  <rect x="47" y="58" width="6" height="12" fill="#5D4037" rx="0.5"/>
  <!-- Foliage -->
  <polygon points="50,22 35,42 65,42" fill="#2E7D32"/>
  <polygon points="50,34 31,52 69,52" fill="#1B5E20"/>
  <polygon points="50,46 27,62 73,62" fill="#0F3813"/>
</svg>
