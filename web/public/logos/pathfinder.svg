<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <!-- Red Triangle pointing down -->
  <polygon points="10,15 90,15 50,85" fill="#D32F2F" stroke="#FFD54F" stroke-width="4" stroke-linejoin="round"/>
  
  <!-- Sword (Vertical, pointing down, behind the shield) -->
  <!-- Handle/Hilt at top -->
  <path d="M 40 33 L 60 33" stroke="#FFD54F" stroke-width="3" stroke-linecap="round"/>
  <path d="M 50 33 L 50 24" stroke="#8D6E63" stroke-width="3.5" stroke-linecap="round"/>
  <circle cx="50" cy="24" r="1.5" fill="#FFD54F"/>
  <!-- Blade -->
  <polygon points="48,33 52,33 51,68 50,70 49,68" fill="#FFD54F" stroke="#FFB300" stroke-width="0.5"/>

  <!-- Royal Blue Shield with White Border in the center, overlaying the sword blade -->
  <path d="M 36 32 C 36 32, 50 35, 64 32 C 64 47, 62 58, 50 66 C 38 58, 36 47, 36 32 Z" fill="#0D47A1" stroke="#FFFFFF" stroke-width="2" stroke-linejoin="round"/>
</svg>
