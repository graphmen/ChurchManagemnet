  <circle cx="50" cy="72" r="3.5" fill="#FFD54F" stroke="#F57F17" stroke-width="0.5"/>
  <circle cx="64" cy="70" r="3" fill="#FFD54F" stroke="#F57F17" stroke-width="0.5"/>
</svg>
