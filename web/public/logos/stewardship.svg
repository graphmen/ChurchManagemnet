  <!-- Hand trunk -->
  <path d="M 45 80 L 55 80 L 54 62 C 55 58, 62 55, 66 50 C 68 47, 65 45, 62 48 C 58 52, 54 55, 52 50 C 50 46, 50 40, 50 35 C 50 32, 47 32, 47 35 C 47 42, 45 48, 43 51 C 40 55, 36 52, 33 50 C 31 49, 30 51, 33 54 C 36 57, 42 62, 42 66 Z" fill="#8D6E63"/>

  <!-- Leaves (green tones) -->
  <!-- Left group -->
