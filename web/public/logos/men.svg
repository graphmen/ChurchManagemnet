<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <!-- Dark green circular border with gold fill inside -->
  <circle cx="50" cy="50" r="42" fill="#1B5E20" stroke="#FFD54F" stroke-width="3"/>
  <circle cx="50" cy="50" r="37" fill="#E8F5E9"/>

  <!-- Stylized Men in unity (Three figures standing together) -->
  <!-- Center figure (tallest) -->
  <circle cx="50" cy="33" r="5" fill="#1B5E20"/>
  <path d="M 42 42 L 58 42 L 56 68 L 44 68 Z" fill="#1B5E20"/>
  
  <!-- Left figure -->
  <circle cx="38" cy="37" r="4.5" fill="#2E7D32"/>
  <path d="M 31 46 L 44 46 L 43 68 L 33 68 Z" fill="#2E7D32"/>
  
  <!-- Right figure -->
  <circle cx="62" cy="37" r="4.5" fill="#2E7D32"/>
  <path d="M 56 46 L 69 46 L 67 68 L 57 68 Z" fill="#2E7D32"/>

  <!-- Golden Shield overlay at the bottom -->
  <path d="M 40 58 C 40 58, 50 60, 60 58 C 60 68, 58 74, 50 80 C 42 74, 40 68, 40 58 Z" fill="#FFD54F" stroke="#FFB300" stroke-width="1"/>
  <!-- Cross in the shield -->
  <path d="M 48 62 L 52 62 L 52 76 L 48 76 Z" fill="#1B5E20"/>
  <path d="M 44 66 L 56 66 L 56 69 L 44 69 Z" fill="#1B5E20"/>
</svg>
